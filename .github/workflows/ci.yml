name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:      # lets `offline` be re-run on demand without a code push.

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.25.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  # Invariant 7 proof — offline-capable.
  # GH free-tier runners reproducibly hang (>10min) on `go mod download` in
  # secondary jobs, even with step-level timeouts (kernel-stalled syscalls
  # aren't responsive to GH's control-plane kill signals; only job-level
  # timeout eventually forces a runner restart). The matrix job already
  # proves the code compiles + tests green across 3 OSes, so this job is
  # NOT run on PRs. Trigger manually via `gh workflow run ci.yml` or when
  # pushing to master/main.
  offline:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Prime module cache with network
        timeout-minutes: 3
        run: go mod download
      - name: Test with network severed
        timeout-minutes: 5
        run: |
          # Block outbound non-loopback traffic via iptables. Proves
          # Invariant 7 (offline-capable): tests must not require external
          # services. Staying in the runner's user + env keeps the primed
          # module cache accessible.
          sudo iptables -I OUTPUT -o lo -j ACCEPT
          sudo ip6tables -I OUTPUT -o lo -j ACCEPT
          sudo iptables -P OUTPUT DROP
          sudo ip6tables -P OUTPUT DROP
          go test -race ./...
