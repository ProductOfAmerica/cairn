name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:      # lets `offline` be re-run on demand without a code push.

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.25.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  # Invariant 7 proof — offline-capable.
  # Relies on actions/setup-go@v5 cache restore to prime the module cache.
  # Does NOT run `go mod download` (that call previously hung for >10min on
  # free-tier runners, likely on sum.golang.org verification). Blocks
  # outbound non-loopback traffic via iptables, then runs the full suite.
  # If a test needs network, it fails cleanly with a connection error —
  # which IS the Invariant 7 signal.
  offline:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Warm up the build cache (no network sever yet)
        timeout-minutes: 3
        run: go build ./...
      - name: Test offline (iptables OUTPUT DROP except loopback)
        timeout-minutes: 4
        run: |
          sudo iptables -I OUTPUT -o lo -j ACCEPT
          sudo ip6tables -I OUTPUT -o lo -j ACCEPT
          sudo iptables -P OUTPUT DROP
          sudo ip6tables -P OUTPUT DROP
          GOFLAGS="-mod=readonly" GOSUMDB=off GOPROXY=off \
            go test -race ./...
