name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.25.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Prime module cache with network
        run: go mod download
      - name: Test with network severed
        run: |
          # Block outbound network via fresh net namespace. Tests must not
          # require external services. Proves Invariant 7 (offline-capable).
          sudo unshare --net --mount --fork --pid --user --map-root-user \
            bash -c 'ip link set lo up && go test -race ./...'
