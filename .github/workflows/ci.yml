name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:      # lets `offline` be re-run on demand without a code push.

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.25.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: go mod verify
        run: go mod verify
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: make test-skills-verify (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: make test-skills-verify
      - name: go test
        run: go test -race ./...

  # Invariant 7 proof — offline-capable. Run the test suite inside a new
  # user+network namespace so the test process sees zero interfaces while
  # the runner agent stays on the host network (and can still stream logs
  # / honor timeouts). The earlier iptables-DROP approach firewalled the
  # runner itself off from GitHub, stranding every run for ~13 minutes
  # until the orphan watchdog reaped it.
  offline:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: Fetch modules + warm build cache
        run: go build ./...
      - name: Allow unprivileged user namespaces (Ubuntu 24.04 AppArmor)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Test offline (unshare --user --net)
        timeout-minutes: 5
        run: |
          unshare --user --net --map-current-user -- \
            env GOFLAGS=-mod=readonly GOSUMDB=off GOPROXY=off \
            go test -race ./...
