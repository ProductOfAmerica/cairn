version: 2

project_name: cairn

before:
  hooks:
    - go mod tidy

builds:
  - id: cairn
    main: ./cmd/cairn
    binary: cairn
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: cairn
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto

scoops:
  - name: cairn
    repository:
      owner: ProductOfAmerica
      name: scoop-cairn
      branch: main
      token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"
    directory: "."
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "scoop: bump cairn to {{ .Tag }}"
    homepage: https://github.com/ProductOfAmerica/cairn
    description: "Verification substrate for AI coding agents — durable memory, append-only verdicts, content-addressed evidence, safe concurrency."
    license: MIT
