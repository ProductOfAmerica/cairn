id: REQ-003
title: cairn spec init silent no-op fix on placeholder files
why: cairn spec init returns a success envelope but the .yaml.example templates never land on disk when a zero-byte predecessor exists at the target path (OneDrive Files-On-Demand placeholder, crash residue, sync-provider stub). The envelope lies. Replace the os.Stat skip proxy with an os.ReadFile content-check plus post-write verify, and type every failure path as cairnerr so the envelope is honest for every outcome.
